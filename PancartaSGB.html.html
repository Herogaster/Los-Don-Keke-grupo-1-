<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pancarta de Sugerencias</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --panel: #141416;
    --card: #1c1c20;
    --card-hover: #222228;
    --accent: #f5c842;
    --accent2: #e8573f;
    --text: #f0ede8;
    --muted: #888;
    --border: #2a2a30;
    --radius: 16px;
    --shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    padding: 36px 48px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
  }
  header h1 span { color: var(--accent); }
  header p {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 14px;
    padding: 28px 48px;
    width: 100%;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 28px;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .btn:active { transform: scale(0.97); }

  .btn-add {
    background: var(--accent);
    color: #000;
    box-shadow: 0 4px 20px rgba(245,200,66,0.35);
  }
  .btn-add:hover { background: #ffd84a; box-shadow: 0 4px 30px rgba(245,200,66,0.5); }

  .btn-del {
    background: transparent;
    color: var(--accent2);
    border: 1.5px solid var(--accent2);
    box-shadow: 0 4px 20px rgba(232,87,63,0.15);
  }
  .btn-del:hover { background: rgba(232,87,63,0.1); }
  .btn-del.active-mode {
    background: var(--accent2);
    color: #fff;
    box-shadow: 0 4px 20px rgba(232,87,63,0.4);
  }

  /* ── GRID ── */
  .grid {
    width: 100%;
    padding: 0 48px 48px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 20px;
    flex: 1;
    min-height: 460px;
  }

  .card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
    min-height: 180px;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%);
    pointer-events: none;
  }

  /* slot number */
  .card-num {
    position: absolute;
    top: 18px;
    right: 20px;
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 900;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    user-select: none;
  }

  .card.empty {
    border-style: dashed;
    border-color: #333;
    justify-content: center;
    align-items: center;
  }
  .card.empty .empty-label {
    color: #444;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .card.empty .empty-icon {
    font-size: 2rem;
    opacity: 0.2;
    margin-bottom: 8px;
  }

  /* delete mode hover */
  .card.has-content.delete-mode {
    cursor: pointer;
    border-color: rgba(232,87,63,0.4);
  }
  .card.has-content.delete-mode:hover {
    background: rgba(232,87,63,0.08);
    border-color: var(--accent2);
    transform: scale(0.98);
  }
  .card.has-content.delete-mode::after {
    content: '✕ Eliminar';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(232,87,63,0.82);
    color: #fff;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: var(--radius);
  }
  .card.has-content.delete-mode:hover::after { opacity: 1; }

  .card-img {
    width: 100%;
    max-height: 130px;
    object-fit: cover;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .card-text {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text);
    flex: 1;
  }
  .card-accent-bar {
    width: 36px;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* badge */
  .badge {
    display: inline-block;
    background: rgba(245,200,66,0.12);
    color: var(--accent);
    border: 1px solid rgba(245,200,66,0.25);
    border-radius: 50px;
    padding: 3px 10px;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    width: fit-content;
  }

  /* ── MODAL OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    animation: fadeIn 0.2s ease;
  }
  .overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 40px;
    width: min(520px, 92vw);
    box-shadow: var(--shadow);
    animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
  }
  .modal h2 span { color: var(--accent); }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .form-group label {
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  textarea {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 14px 16px;
    resize: vertical;
    min-height: 110px;
    transition: border-color 0.2s;
    outline: none;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent); }

  .img-upload-area {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .img-upload-area:hover { border-color: var(--accent); background: rgba(245,200,66,0.04); }
  .img-upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .img-upload-area .upload-icon { font-size: 1.8rem; }
  .img-upload-area p { color: var(--muted); font-size: 0.85rem; text-align: center; }
  .img-upload-area strong { color: var(--text); font-size: 0.9rem; }

  #preview-img {
    display: none;
    width: 100%;
    max-height: 140px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 4px;
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    padding-top: 4px;
  }
  .btn-confirm {
    flex: 1;
    background: var(--accent);
    color: #000;
    font-weight: 600;
    font-size: 1rem;
    padding: 15px;
    border-radius: 50px;
    box-shadow: 0 4px 20px rgba(245,200,66,0.35);
  }
  .btn-confirm:hover { background: #ffd84a; }

  .btn-cancel {
    background: var(--card);
    color: var(--muted);
    border: 1.5px solid var(--border);
    padding: 15px 22px;
    border-radius: 50px;
    font-size: 0.95rem;
  }
  .btn-cancel:hover { color: var(--text); border-color: #555; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 0.9rem;
    box-shadow: var(--shadow);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── FOOTER ── */
  footer {
    padding: 18px 48px;
    color: #333;
    font-size: 0.78rem;
    width: 100%;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .slot-count { color: var(--muted); }
  .slot-count span { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div>
    <p>Tablero colectivo</p>
    <h1>Pancarta de <span>Sugerencias</span></h1>
  </div>
</header>

<!-- ══ CONTROLS ══ -->
<div class="controls">
  <button class="btn btn-add" onclick="openModal()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Agregar sugerencia
  </button>
  <button class="btn btn-del" id="btnDel" onclick="toggleDeleteMode()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    Eliminar sugerencia
  </button>
</div>

<!-- ══ GRID ══ -->
<div class="grid" id="grid">
  <!-- 4 slots generados por JS -->
</div>

<!-- ══ MODAL ══ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Nueva <span>Sugerencia</span></h2>

    <div class="form-group">
      <label>Texto de la sugerencia</label>
      <textarea id="inputText" placeholder="Escribe tu sugerencia aquí…"></textarea>
    </div>

    <div class="form-group">
      <label>Imagen (opcional)</label>
      <div class="img-upload-area" id="uploadArea">
        <input type="file" id="inputImg" accept="image/*" onchange="previewImage(event)">
        <span class="upload-icon">🖼️</span>
        <strong>Haz clic o arrastrá una imagen</strong>
        <p>PNG, JPG, GIF, WEBP</p>
      </div>
      <img id="preview-img" alt="Vista previa">
    </div>

    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-confirm" onclick="confirmSuggestion()">
        ✓ &nbsp;Confirmar sugerencia
      </button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

<!-- ══ FOOTER ══ -->
<footer>
  <span>Pancarta de Sugerencias</span>
  <span class="slot-count">Slots usados: <span id="usedCount">0</span> / 4</span>
</footer>

<script>
  // ─── State ───────────────────────────────────────────
  const MAX = 4;
  let suggestions = Array(MAX).fill(null); // null = vacío
  let deleteMode = false;
  let pendingImageData = null;

  // ─── Init ─────────────────────────────────────────────
  renderGrid();

  // ─── Grid ─────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    suggestions.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'card ' + (s ? 'has-content' : 'empty') + (deleteMode && s ? ' delete-mode' : '');
      card.dataset.index = i;

      if (s) {
        card.innerHTML = `
          <span class="card-num">${i + 1}</span>
          <div class="card-accent-bar"></div>
          ${s.img ? `<img class="card-img" src="${s.img}" alt="imagen">` : ''}
          <div class="card-text">${escHtml(s.text)}</div>
          <span class="badge">Sugerencia ${i + 1}</span>
        `;
        if (deleteMode) card.addEventListener('click', () => deleteSuggestion(i));
      } else {
        card.innerHTML = `
          <span class="card-num">${i + 1}</span>
          <div class="empty-icon">💡</div>
          <span class="empty-label">Slot disponible</span>
        `;
      }

      grid.appendChild(card);
    });

    document.getElementById('usedCount').textContent = suggestions.filter(Boolean).length;
  }

  // ─── Modal ────────────────────────────────────────────
  function openModal() {
    const used = suggestions.filter(Boolean).length;
    if (used >= MAX) { showToast('⚠️ Ya hay 4 sugerencias. Eliminá una para agregar otra.'); return; }
    document.getElementById('overlay').classList.add('open');
    document.getElementById('inputText').value = '';
    document.getElementById('preview-img').style.display = 'none';
    document.getElementById('inputImg').value = '';
    document.getElementById('uploadArea').style.display = 'flex';
    pendingImageData = null;
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  // Close on overlay click
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ─── Image preview ────────────────────────────────────
  function previewImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      pendingImageData = ev.target.result;
      const img = document.getElementById('preview-img');
      img.src = pendingImageData;
      img.style.display = 'block';
      document.getElementById('uploadArea').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  // ─── Confirm ──────────────────────────────────────────
  function confirmSuggestion() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) { showToast('✏️ Escribí un texto para la sugerencia.'); return; }

    const idx = suggestions.findIndex(s => s === null);
    if (idx === -1) { showToast('⚠️ No hay slots disponibles.'); return; }

    suggestions[idx] = { text, img: pendingImageData || null };
    closeModal();
    renderGrid();
    showToast('✅ Sugerencia agregada en el slot ' + (idx + 1));
  }

  // ─── Delete mode ──────────────────────────────────────
  function toggleDeleteMode() {
    const hasContent = suggestions.some(Boolean);
    if (!hasContent && !deleteMode) { showToast('ℹ️ No hay sugerencias para eliminar.'); return; }
    deleteMode = !deleteMode;
    document.getElementById('btnDel').classList.toggle('active-mode', deleteMode);
    renderGrid();
    if (deleteMode) showToast('🗑️ Hacé clic en la sugerencia que querés eliminar.');
    else showToast('✏️ Modo eliminación desactivado.');
  }

  function deleteSuggestion(i) {
    suggestions[i] = null;
    // Compactar: mover las no-nulas al frente
    const filled = suggestions.filter(Boolean);
    suggestions = [...filled, ...Array(MAX - filled.length).fill(null)];
    renderGrid();
    showToast('🗑️ Sugerencia eliminada.');
    if (!suggestions.some(Boolean)) {
      deleteMode = false;
      document.getElementById('btnDel').classList.remove('active-mode');
    }
  }

  // ─── Toast ────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ─── Utils ────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
